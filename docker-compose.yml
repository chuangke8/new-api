services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fansxai:local
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  1panel-network:
    external: true
