<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>New API</title>
    <meta name="title" content="New API" />
    <meta
      name="description"
      content="Unified AI API gateway and admin dashboard."
    />
    <script>
      ;(() => {
        const applyTitle = (name) => {
          if (!name || typeof name !== 'string') return
          document.title = name
          document
            .querySelector('meta[name="title"]')
            ?.setAttribute('content', name)
        }

        try {
          const cached = localStorage.getItem('status')
          if (cached) {
            applyTitle(JSON.parse(cached)?.system_name)
          }
        } catch {}

        fetch('/api/status', { credentials: 'same-origin' })
          .then((response) => (response.ok ? response.json() : null))
          .then((data) => {
            const payload = data?.data ?? data
            applyTitle(payload?.system_name)
            if (payload) {
              try {
                localStorage.setItem('status', JSON.stringify(payload))
              } catch {}
            }
          })
          .catch(() => {})
      })()
    </script>

    <meta name="theme-color" content="#fff" />
    <!--umami-->
    <!--Google Analytics-->
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
